# .github/workflows/sonarcloud-to-github-issues.yml
name: SonarCloud → GitHub Issues

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: sonarcloud-issues-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud_issues:
    runs-on: ubuntu-latest

    env:
      # Required secrets:
      #   SONAR_TOKEN: SonarCloud token (project analysis token is fine)
      # GitHub provides:
      #   GITHUB_TOKEN: auto
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Customize these:
      SONAR_HOST: https://sonarcloud.io
      SONAR_PROJECT_KEY: nikhilxsunder_fedfred
      SONAR_ORGANIZATION: nikhilxsunder

      # Filtering:
      SONAR_TYPES: BUG,VULNERABILITY,CODE_SMELL
      SONAR_SEVERITIES: BLOCKER,CRITICAL,MAJOR,MINOR
      NEW_CODE_ONLY: "true" # uses sinceLeakPeriod=true

      # Issue labeling:
      GH_LABELS: "sonarcloud,static-analysis"

    steps:
      - name: Checkout (for repo context only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub issues from SonarCloud issues
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SONAR_TOKEN:-}" ]]; then
            echo "SONAR_TOKEN secret is missing."
            exit 1
          fi

          # Determine branch name for links + Sonar query
          PR_KEY=""
          SONAR_BRANCH_PARAM=""
          SONAR_PR_PARAM=""
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BRANCH="${{ github.head_ref }}"
            PR_KEY="${{ github.event.pull_request.number }}"
            SONAR_PR_PARAM="&pullRequest=${PR_KEY}"
          else
            BRANCH="${{ github.ref_name }}"
            SONAR_BRANCH_PARAM="&branch=${BRANCH}"
          fi

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          # Helpers (avoid heredoc; jq is preinstalled on ubuntu-latest)
          urlencode() {
            printf '%s' "$1" | jq -s -R -r @uri
          }

          # Sonar search endpoint
          BASE_URL="${SONAR_HOST}/api/issues/search"
          TYPES_ENC="$(urlencode "${SONAR_TYPES}")"
          SEV_ENC="$(urlencode "${SONAR_SEVERITIES}")"

          # Restrict to "New Code" (Leak Period) by default to avoid flooding
          SINCE_LEAK=""
          if [[ "${NEW_CODE_ONLY}" == "true" ]]; then
            SINCE_LEAK="&sinceLeakPeriod=true"
          fi

          # Pagination
          PAGE=1
          PAGE_SIZE=100
          TOTAL=1

          echo "Querying SonarCloud issues for project: ${SONAR_PROJECT_KEY}"
          echo "Event: ${{ github.event_name }}, Branch: ${BRANCH}, PR: ${PR_KEY:-<none>}"

          while (( (PAGE - 1) * PAGE_SIZE < TOTAL )); do
            QUERY="${BASE_URL}?componentKeys=$(urlencode "${SONAR_PROJECT_KEY}")${SONAR_BRANCH_PARAM}${SONAR_PR_PARAM}${SINCE_LEAK}&resolved=false&types=${TYPES_ENC}&severities=${SEV_ENC}&ps=${PAGE_SIZE}&p=${PAGE}"

            RESP="$(curl -fsSL -u "${SONAR_TOKEN}:" "${QUERY}")"

            TOTAL="$(echo "${RESP}" | jq -r '.total // 0')"
            COUNT="$(echo "${RESP}" | jq -r '.issues | length')"

            echo "Page ${PAGE}: ${COUNT} issues (total: ${TOTAL})"

            if (( COUNT == 0 )); then
              break
            fi

            # Iterate issues
            echo "${RESP}" | jq -c '.issues[]' | while read -r issue; do
              ISSUE_KEY="$(echo "${issue}" | jq -r '.key')"
              RULE="$(echo "${issue}" | jq -r '.rule')"
              SEVERITY="$(echo "${issue}" | jq -r '.severity')"
              TYPE="$(echo "${issue}" | jq -r '.type')"
              MESSAGE="$(echo "${issue}" | jq -r '.message')"
              COMPONENT="$(echo "${issue}" | jq -r '.component')"
              LINE="$(echo "${issue}" | jq -r '.line // empty')"

              # component looks like "projectKey:path/to/file.py"
              FILE_PATH="${COMPONENT#*:}"

              # Construct GitHub code link (best-effort)
              if [[ -n "${LINE}" ]]; then
                GH_CODE_URL="https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${FILE_PATH}#L${LINE}"
                LOC="${FILE_PATH}:${LINE}"
              else
                GH_CODE_URL="https://github.com/${OWNER}/${REPO}/blob/${BRANCH}/${FILE_PATH}"
                LOC="${FILE_PATH}"
              fi

              # Sonar issue deep link
              SONAR_ISSUE_URL="${SONAR_HOST}/project/issues?id=$(urlencode "${SONAR_PROJECT_KEY}")&open=$(urlencode "${ISSUE_KEY}")&issues=$(urlencode "${ISSUE_KEY}")"

              # Dedup marker
              MARKER="<!-- sonar_issue:${ISSUE_KEY} -->"

              # Check if a GitHub issue already exists for this Sonar issue key
              SEARCH_Q="repo:${OWNER}/${REPO} is:issue is:open ${ISSUE_KEY}"
              EXISTING="$(gh api -H "Accept: application/vnd.github+json" \
                "/search/issues?q=$(urlencode "${SEARCH_Q}")" \
                --jq '.total_count')"

              if [[ "${EXISTING}" != "0" ]]; then
                echo "Skip (already exists): ${ISSUE_KEY}"
                continue
              fi

              TITLE="SonarCloud ${TYPE} (${SEVERITY}): ${RULE} @ ${LOC}"

              # NOTE: heredoc content MUST remain indented inside this run block.
              BODY="$(cat <<EOF
              ${MARKER}

              ### SonarCloud finding

              - **Type:** ${TYPE}
              - **Severity:** ${SEVERITY}
              - **Rule:** ${RULE}

              **Message**
              ${MESSAGE}

              **Location**
              ${LOC}

              **Links**
              - GitHub: ${GH_CODE_URL}
              - SonarCloud: ${SONAR_ISSUE_URL}

              **Context**
              - Event: ${{ github.event_name }}
              - Branch: ${BRANCH}
              - PR: ${PR_KEY:-N/A}
              EOF
              )"

                            # Create issue
                            # Labels are best-effort; unknown labels are ignored by GitHub.
                            LABELS_JSON="$(printf '%s' "${GH_LABELS}" | jq -R -s 'split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length>0))')"

                            echo "Creating GitHub issue for ${ISSUE_KEY}"
                            gh api -H "Accept: application/vnd.github+json" \
                              -X POST "/repos/${OWNER}/${REPO}/issues" \
                              -f title="${TITLE}" \
                              -f body="${BODY}" \
                              -f labels="${LABELS_JSON}"
                          done

                          PAGE=$((PAGE + 1))
                        done