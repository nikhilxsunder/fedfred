name: SonarCloud

on:
  push:
    branches: [main, v4-dev]
  pull_request:

jobs:
  sonar:
    runs-on: ubuntu-latest

    env:
      FEDFRED_SRC: "src/fedfred"
      FEDFRED_TESTS: "tests"
      REPORT_DIR: "reports/sonar"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Prefer dev extras if present; otherwise tools install below covers CI.
          pip install -e ".[dev]" || true
          pip install pytest pytest-cov pylint mypy bandit

      - name: Create report directory
        run: |
          mkdir -p "${REPORT_DIR}"

      # ---------------------------
      # Tests + Coverage (XML)
      # ---------------------------
      - name: Pytest with coverage
        run: |
          pytest \
            --cov="${FEDFRED_SRC}" \
            --cov-report=term-missing \
            --cov-report=xml:"${REPORT_DIR}/coverage.xml"

      # ---------------------------
      # Pylint (parseable)
      # ---------------------------
      - name: Pylint
        run: |
          pylint "${FEDFRED_SRC}" "${FEDFRED_TESTS}" \
            --output-format=parseable \
            > "${REPORT_DIR}/pylint.txt" || true

      # ---------------------------
      # MyPy (text)
      # ---------------------------
      - name: MyPy
        run: |
          mypy "${FEDFRED_SRC}" "${FEDFRED_TESTS}" \
            --no-pretty \
            --show-column-numbers \
            --show-error-codes \
            > "${REPORT_DIR}/mypy.txt" || true

      # ---------------------------
      # Bandit (json)
      # ---------------------------
      - name: Bandit
        run: |
          bandit -r "${FEDFRED_SRC}" \
            -f json \
            -o "${REPORT_DIR}/bandit.json" || true

      # ---------------------------
      # SonarCloud Scan
      # ---------------------------
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
            SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}