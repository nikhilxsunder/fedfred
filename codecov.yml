codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "85...100"

  status:
    project:
      default:
        target: 100%
        threshold: 1%
        if_ci_failed: error
        informational: false
        only_pulls: false

    patch:
      default:
        target: 100%
        threshold: 1%
        if_ci_failed: error
        informational: false

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

ignore:
  - "tests/**"
  - "**/__init__.py"
  - "**/conftest.py"
  - "**/version.py"
  - "**/typing.py"
  - "docs/**"
  - "examples/**"
  - ".venv/**"

flags:
  unit:
    paths:
      - src/
    carryforward: false