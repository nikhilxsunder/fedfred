# Required
sonar.projectKey=nikhilxsunder_fedfred
sonar.organization=nikhilxsunder
sonar.projectName=fedfred

# Source layout
sonar.sources=src/fedfred
sonar.tests=tests

# Coverage
sonar.python.coverage.reportPaths=reports/sonar/coverage.xml

# External analyzer reports
sonar.python.pylint.reportPaths=reports/sonar/pylint.txt
sonar.python.mypy.reportPaths=reports/sonar/mypy.txt
sonar.python.bandit.reportPaths=reports/sonar/bandit.json

# Optional: Exclusions
sonar.exclusions=\
**/docs/**,\
**/examples/**,\
**/notebooks/**,\
**/scripts/**,\
**/__pycache__/**

# Optional: Coverage exclusions
sonar.coverage.exclusions=\
**/__init__.py,\
**/tests/**